groups:
  - name: system_alerts
    rules:
      - alert: HighMemoryAllocation
        expr: etl_memory_alloc_mb > 10
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "High Memory Allocation (> 10MB)"
          description: "System memory allocation has exceeded the 10MB threshold for more than 1 minute. Current value: {{ $value }}MB."

      - alert: HighGoroutineCount
        expr: etl_goroutines > 100
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "High Goroutine Count (> 100)"
          description: "Active goroutines have exceeded 100 for more than 1 minute. Current value: {{ $value }}."
