groups:
  - name: ETLAlerts
    rules:
      - alert: GoroutineLeak
        expr: deriv(etl_goroutines[5m]) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Potential Goroutine Leak detected"
          description: "The number of active goroutines is continuously growing over a 5-minute window."

      - alert: HighGCPause
        expr: sum(rate(etl_gc_pause_ms_sum[1m])) / sum(rate(etl_gc_pause_ms_count[1m])) > 100
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "High GC Pause Time"
          description: "Average GC pause time is exceeding 100ms over the last minute."
