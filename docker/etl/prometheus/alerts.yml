groups:
  - name: etl_alerts
    rules:
      - alert: HighGCPause
        expr: etl_gc_pause_ms > 20
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "High GC pause time"
          description: "GC pause time is > 20ms for more than 1 minute."

      - alert: HighGoroutineCount
        expr: rate(etl_goroutines[5m]) > 0 and etl_goroutines > 10000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Continuously rising goroutine count"
          description: "Goroutine count is > 10000 and rising."