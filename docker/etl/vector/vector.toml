[sources.metrics_in]
type = "file"
include = ["/workspace/logs/etl/system_metrics.jsonl"]
read_from = "beginning"

[transforms.parse_logs]
type = "remap"
inputs = ["metrics_in"]
source = '''
  . = parse_json!(.message)
'''

[transforms.log_to_metric_transform]
type = "log_to_metric"
inputs = ["parse_logs"]

  [[transforms.log_to_metric_transform.metrics]]
  type = "gauge"
  field = "memory_alloc_mb"
  name = "etl_memory_alloc_mb"

  [[transforms.log_to_metric_transform.metrics]]
  type = "gauge"
  field = "goroutines"
  name = "etl_goroutines"

  [[transforms.log_to_metric_transform.metrics]]
  type = "gauge"
  field = "gc_pause_ms"
  name = "etl_gc_pause_ms"

  [[transforms.log_to_metric_transform.metrics]]
  type = "counter"
  field = "http_requests_total"
  name = "etl_http_requests_total"

  [[transforms.log_to_metric_transform.metrics]]
  type = "histogram"
  field = "http_request_duration_seconds"
  name = "etl_http_request_duration_seconds"

[sinks.prometheus_out]
type = "prometheus_exporter"
inputs = ["log_to_metric_transform"]
address = "0.0.0.0:8686"
default_namespace = "vector"

[sinks.loki_out]
type = "loki"
inputs = ["parse_logs"]
endpoint = "http://loki:3100"
encoding.codec = "json"
  [sinks.loki_out.labels]
  level = "{{level}}"
  caller = "{{caller}}"
