[sources.metrics_file]
type = "file"
include = ["/workspace/logs/etl/system_metrics.jsonl"]
read_from = "beginning"

[transforms.parse_json]
type = "remap"
inputs = ["metrics_file"]
source = '''
. = parse_json!(.message)
'''

[transforms.metrics_extractor]
type = "log_to_metric"
inputs = ["parse_json"]

  [[transforms.metrics_extractor.metrics]]
  type = "counter"
  field = "http_requests"
  name = "etl_http_requests_total"
  tags = { status = "{{status}}", method = "{{method}}" }

  [[transforms.metrics_extractor.metrics]]
  type = "histogram"
  field = "http_request_duration"
  name = "etl_http_request_duration_seconds"
  tags = { status = "{{status}}", method = "{{method}}" }

  [[transforms.metrics_extractor.metrics]]
  type = "gauge"
  field = "goroutines"
  name = "etl_goroutines"

  [[transforms.metrics_extractor.metrics]]
  type = "histogram"
  field = "gc_pause_ms"
  name = "etl_gc_pause_ms"

[sinks.prometheus_exporter]
type = "prometheus_exporter"
inputs = ["metrics_extractor"]
address = "0.0.0.0:8686"

[sinks.loki_exporter]
type = "loki"
inputs = ["parse_json"]
endpoint = "http://loki:3100"
labels = { source = "vector_etl" }
encoding.codec = "json"
