[sources.system_metrics]
type = "file"
include = [
  "/workspace/logs/etl/system_metrics.jsonl",
  "/workspace/workspace/logs/etl/system_metrics.jsonl"
]
read_from = "beginning"

[sources.app_logs]
type = "file"
include = [
  "/workspace/docker/data/logs/gateway.log",
  "/workspace/workspace/docker/data/logs/gateway.log",
  "/workspace/docker/data/logs/launcher.log",
  "/workspace/workspace/docker/data/logs/launcher.log"
]
read_from = "beginning"

[transforms.parse_app_logs]
type = "remap"
inputs = ["app_logs"]
source = '''
. = parse_json!(.message)
'''

[transforms.extract_request_metrics]
type = "log_to_metric"
inputs = ["parse_app_logs"]
[[transforms.extract_request_metrics.metrics]]
type = "counter"
field = "level"
name = "etl_request_count"
increment_by_value = false
  [transforms.extract_request_metrics.metrics.tags]
  status = "{{level}}"

[transforms.parse_system_metrics]
type = "remap"
inputs = ["system_metrics"]
source = '''
. = parse_json!(.message)
'''

[transforms.gc_pause_to_ms]
type = "remap"
inputs = ["parse_system_metrics"]
source = '''
if exists(.PauseNs) && exists(.NumGC) {
  index = (.NumGC + 255) % 256
  .pause_ns = to_float!(.PauseNs[index]) / 1000000.0
}
'''

[transforms.extract_system_metrics_ms]
type = "log_to_metric"
inputs = ["gc_pause_to_ms"]
[[transforms.extract_system_metrics_ms.metrics]]
type = "histogram"
field = "pause_ns"
name = "etl_gc_pause_ms"
[[transforms.extract_system_metrics_ms.metrics]]
type = "gauge"
field = "NumGC"
name = "etl_num_gc"
[[transforms.extract_system_metrics_ms.metrics]]
type = "gauge"
field = "Goroutines"
name = "etl_goroutines"

[sinks.prometheus_exporter]
type = "prometheus_exporter"
inputs = ["extract_request_metrics", "extract_system_metrics_ms"]
address = "0.0.0.0:9090"
default_namespace = "etl"

[sinks.loki]
type = "loki"
inputs = ["parse_app_logs", "parse_system_metrics"]
endpoint = "http://loki:3100"
encoding.codec = "json"
labels.source = "vector"
