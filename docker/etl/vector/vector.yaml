sources:
  system_metrics_file:
    type: "file"
    include:
      - "/workspace/logs/etl/system_metrics.jsonl"
    read_from: "beginning"

transforms:
  parse_json:
    type: "remap"
    inputs:
      - "system_metrics_file"
    source: |
      . = parse_json!(.message)
      .timestamp = to_timestamp!(.timestamp)

  metrics_transform:
    type: "log_to_metric"
    inputs:
      - "parse_json"
    metrics:
      - type: "gauge"
        field: "goroutines"
        name: "etl_goroutines"
        namespace: "system"
        tags:
          source: "etl_pipeline"
      - type: "gauge"
        field: "memory_alloc_mb"
        name: "etl_memory_alloc_mb"
        namespace: "system"
        tags:
          source: "etl_pipeline"
      - type: "gauge"
        field: "memory_total_mb"
        name: "etl_memory_total_mb"
        namespace: "system"
        tags:
          source: "etl_pipeline"
      - type: "gauge"
        field: "memory_sys_mb"
        name: "etl_memory_sys_mb"
        namespace: "system"
        tags:
          source: "etl_pipeline"
      - type: "gauge"
        field: "num_gc"
        name: "etl_num_gc"
        namespace: "system"
        tags:
          source: "etl_pipeline"

sinks:
  prometheus_exporter:
    type: "prometheus_exporter"
    inputs:
      - "metrics_transform"
    address: "0.0.0.0:9090"

  loki_sink:
    type: "loki"
    inputs:
      - "parse_json"
    endpoint: "http://loki:3100"
    encoding:
      codec: "json"
    labels:
      job: "etl_system_metrics"
