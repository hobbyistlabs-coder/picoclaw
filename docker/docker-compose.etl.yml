services:
  vector:
    image: timberio/vector:0.34.0-alpine
    volumes:
      - ../workspace/logs/etl:/var/log/etl:ro
      - ./data/vector/vector.toml:/etc/vector/vector.toml:ro
    ports:
      - "8686:8686"
      - "9090:9090"
    command: ["--config", "/etc/vector/vector.toml"]
    depends_on:
      - loki

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./data/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./data/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9091:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

  loki:
    image: grafana/loki:latest
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki_data:/loki

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./data/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./data/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki

volumes:
  prometheus_data:
  loki_data:
  grafana_data:
