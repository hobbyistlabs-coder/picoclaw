services:
  vector:
    image: timberio/vector:0.35.0-alpine
    container_name: vector
    volumes:
      - ./etl/vector/vector.toml:/etc/vector/vector.toml:ro
      - ../data/workspace/logs/etl:/workspace/logs/etl:ro
    ports:
      - "8686:8686" # Vector API/Metrics
    restart: unless-stopped
    networks:
      - etl-net

  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: prometheus
    volumes:
      - ./etl/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./etl/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    restart: unless-stopped
    networks:
      - etl-net

  loki:
    image: grafana/loki:2.9.0
    container_name: loki
    volumes:
      - ./etl/loki/local-config.yaml:/etc/loki/local-config.yaml:ro
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped
    networks:
      - etl-net

  grafana:
    image: grafana/grafana:10.0.3
    container_name: grafana
    volumes:
      - ./etl/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./etl/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    ports:
      - "3000:3000"
    restart: unless-stopped
    depends_on:
      - prometheus
      - loki
    networks:
      - etl-net

networks:
  etl-net:
    driver: bridge

volumes:
  prometheus_data:
  grafana_data:
