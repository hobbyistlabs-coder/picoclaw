services:
  vector:
    image: timberio/vector:0.34.0-alpine
    container_name: etl_vector
    volumes:
      - ./etl/vector/vector.toml:/etc/vector/vector.toml:ro
      - ../workspace/logs/etl:/workspace/logs/etl:ro
    ports:
      - "9090:9090"
    depends_on:
      - loki
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: etl_prometheus
    volumes:
      - ./etl/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./etl/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9091:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    restart: unless-stopped

  loki:
    image: grafana/loki:2.9.2
    container_name: etl_loki
    volumes:
      - loki_data:/loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.2.2
    container_name: etl_grafana
    volumes:
      - ./etl/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - loki
    restart: unless-stopped

volumes:
  prometheus_data:
  loki_data:
  grafana_data:
