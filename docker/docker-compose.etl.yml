services:
  vector:
    image: timberio/vector:0.35.0-alpine
    container_name: etl-vector
    volumes:
      - ./etl/vector/vector.toml:/etc/vector/vector.toml:ro
      - ../workspace/logs/etl:/var/log/etl:ro
    ports:
      - "8686:8686"
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.49.1
    container_name: etl-prometheus
    volumes:
      - ./etl/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./etl/prometheus/alert.rules.yml:/etc/prometheus/alert.rules.yml:ro
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    restart: unless-stopped

  loki:
    image: grafana/loki:2.9.4
    container_name: etl-loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.2.3
    container_name: etl-grafana
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
    volumes:
      - ./etl/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./etl/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./etl/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - loki
    restart: unless-stopped
