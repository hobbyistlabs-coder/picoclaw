services:
  vector:
    image: timberio/vector:0.34.0-alpine
    container_name: etl_vector
    volumes:
      - ./data/vector/vector.toml:/etc/vector/vector.toml:ro
      - ../workspace/logs/etl:/workspace/logs/etl:ro
    ports:
      - "8686:8686" # API (if needed)
      - "9090:9090" # Prometheus metrics endpoint from Vector
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: etl_prometheus
    volumes:
      - ./data/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./data/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
    ports:
      - "9091:9090"
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

  loki:
    image: grafana/loki:2.9.1
    container_name: etl_loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.1.5
    container_name: etl_grafana
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
    volumes:
      - ./data/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./data/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    restart: unless-stopped
    depends_on:
      - prometheus
      - loki
