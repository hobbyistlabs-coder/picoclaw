version: '3.8'

services:
  vector:
    image: timberio/vector:0.35.X-alpine
    container_name: etl_vector
    volumes:
      - ./etl/vector/vector.yaml:/etc/vector/vector.yaml:ro
      - ../workspace/logs/etl:/workspace/logs/etl:ro
    ports:
      - "8686:8686" # Vector API
      - "9598:9598" # Prometheus Exporter
    restart: unless-stopped
    command: -c /etc/vector/vector.yaml

  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: etl_prometheus
    volumes:
      - ./etl/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./etl/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'

  loki:
    image: grafana/loki:2.9.0
    container_name: etl_loki
    volumes:
      - ./etl/loki/local-config.yaml:/etc/loki/local-config.yaml:ro
    ports:
      - "3100:3100"
    restart: unless-stopped
    command: -config.file=/etc/loki/local-config.yaml

  grafana:
    image: grafana/grafana:10.0.3
    container_name: etl_grafana
    volumes:
      - ./etl/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./etl/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    ports:
      - "3000:3000"
    restart: unless-stopped
    depends_on:
      - prometheus
      - loki

volumes:
  prometheus_data:
  grafana_data:
