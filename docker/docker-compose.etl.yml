services:
  vector:
    image: timberio/vector:0.34.0-alpine
    container_name: etl-vector
    volumes:
      - ./etl/vector/vector.yaml:/etc/vector/vector.yaml:ro
      - ../workspace/logs/etl:/workspace/logs/etl:ro
    ports:
      - "9090:9090"
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: etl-prometheus
    volumes:
      - ./etl/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./etl/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
    ports:
      - "9091:9090"
    restart: unless-stopped

  loki:
    image: grafana/loki:latest
    container_name: etl-loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: etl-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./etl/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./etl/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
    restart: unless-stopped
    depends_on:
      - prometheus
      - loki
