services:
  picoclaw-agent:
    build:
      context: ..
      dockerfile: docker/Dockerfile.full
    container_name: picoclaw-agent-full
    profiles: ["agent"]
    env_file: ["../.env.local"]
    environment:
      PICOCLAW_HOME: /root/.picoclaw
      PICOCLAW_CONFIG: /root/.picoclaw/config.json
    volumes:
      - ../config:/root/.picoclaw
      - ./workspace:/root/.picoclaw/workspace
      - picoclaw-npm-cache:/root/.npm
    entrypoint: ["picoclaw", "agent"]
    stdin_open: true
    tty: true
  picoclaw-gateway:
    build:
      context: ..
      dockerfile: docker/Dockerfile.full
    container_name: picoclaw-gateway-full
    restart: unless-stopped
    profiles: ["gateway", "launcher"]
    env_file: ["../.env.local"]
    environment:
      PICOCLAW_HOME: /root/.picoclaw
      PICOCLAW_CONFIG: /root/.picoclaw/config.json
    ports:
      - "127.0.0.1:18790:18790"
    volumes:
      - ../config:/root/.picoclaw
      - ./workspace:/root/.picoclaw/workspace
      - picoclaw-npm-cache:/root/.npm
    command: ["gateway"]
  picoclaw-launcher:
    build:
      context: ..
      dockerfile: docker/Dockerfile.launcher.api
    container_name: picoclaw-launcher-full
    restart: unless-stopped
    profiles: ["launcher"]
    env_file: ["../.env.local"]
    environment:
      PICOCLAW_HOME: /root/.picoclaw
      PICOCLAW_CONFIG: /root/.picoclaw/config.json
      JANE_AI_LAUNCHER_UI_MODE: api-only
      JANE_AI_GATEWAY_BASE_URL: http://picoclaw-gateway:18790
    depends_on:
      - picoclaw-gateway
    volumes:
      - ../config:/root/.picoclaw
      - ./workspace:/root/.picoclaw/workspace
    expose:
      - "18800"
  picoclaw-frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    container_name: picoclaw-frontend-full
    restart: unless-stopped
    profiles: ["launcher"]
    depends_on:
      - picoclaw-launcher
    ports:
      - "127.0.0.1:18800:80"
volumes:
  picoclaw-npm-cache:
