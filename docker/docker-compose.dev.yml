services:
  picoclaw-gateway:
    build:
      context: ..
      dockerfile: docker/Dockerfile.full
    container_name: picoclaw-gateway-dev
    restart: unless-stopped
    env_file: ["../.env.local"]
    environment:
      PICOCLAW_HOME: /root/.picoclaw
      PICOCLAW_CONFIG: /root/.picoclaw/config.json
    ports:
      - "127.0.0.1:18790:18790"
    volumes:
      - ../config:/root/.picoclaw
      - picoclaw-workspace:/root/.picoclaw/workspace
      - picoclaw-npm-cache:/root/.npm
    command: ["gateway"]

  picoclaw-launcher:
    build:
      context: ..
      dockerfile: docker/Dockerfile.launcher.api
    container_name: picoclaw-launcher-dev
    restart: unless-stopped
    env_file: ["../.env.local"]
    environment:
      PICOCLAW_HOME: /root/.picoclaw
      PICOCLAW_CONFIG: /root/.picoclaw/config.json
      JANE_AI_LAUNCHER_UI_MODE: api-only
      JANE_AI_GATEWAY_BASE_URL: http://picoclaw-gateway:18790
    depends_on:
      - picoclaw-gateway
    volumes:
      - ../config:/root/.picoclaw
      - picoclaw-workspace:/root/.picoclaw/workspace
    ports:
      - "127.0.0.1:18801:18800"

  picoclaw-frontend-dev:
    image: oven/bun:1
    container_name: picoclaw-frontend-dev
    working_dir: /app
    command: sh -lc "bun install && bun run dev --host 0.0.0.0 --port 5173"
    environment:
      CHOKIDAR_USEPOLLING: "true"
      VITE_API_PROXY_TARGET: http://picoclaw-launcher:18800
    depends_on:
      - picoclaw-launcher
    volumes:
      - ../web/frontend:/app
    ports:
      - "127.0.0.1:5173:5173"

volumes:
  picoclaw-workspace:
  picoclaw-npm-cache:
