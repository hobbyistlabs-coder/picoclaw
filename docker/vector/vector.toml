[sources.etl_metrics]
type = "file"
include = ["/workspace/logs/etl/system_metrics.jsonl"]
read_from = "end"

[transforms.parse_json]
type = "remap"
inputs = ["etl_metrics"]
source = '''
  . = parse_json!(.message)
'''

[transforms.metrics_extractor]
type = "log_to_metric"
inputs = ["parse_json"]

  [[transforms.metrics_extractor.metrics]]
  type = "counter"
  field = "http_requests_total"
  name = "etl_http_requests_total"
  tags = { status = "{{status}}" }

  [[transforms.metrics_extractor.metrics]]
  type = "histogram"
  field = "http_request_duration_seconds"
  name = "etl_http_request_duration_seconds"
  tags = { status = "{{status}}" }

  [[transforms.metrics_extractor.metrics]]
  type = "gauge"
  field = "goroutines"
  name = "etl_goroutines"

  [[transforms.metrics_extractor.metrics]]
  type = "histogram"
  field = "gc_pause_ms"
  name = "etl_gc_pause_ms"

[sinks.prometheus_exporter]
type = "prometheus_exporter"
inputs = ["metrics_extractor"]
address = "0.0.0.0:9598"
default_namespace = "etl"

[sinks.loki]
type = "loki"
inputs = ["parse_json"]
endpoint = "http://loki:3100"
labels = { job = "etl_logs" }
encoding.codec = "json"
