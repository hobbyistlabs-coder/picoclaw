[sources.system_metrics]
type = "file"
include = ["/workspace/logs/etl/system_metrics.jsonl"]
read_from = "beginning"

[transforms.parse_json]
type = "remap"
inputs = ["system_metrics"]
source = '''
. = parse_json!(.message)
'''

[transforms.extract_metrics]
type = "log_to_metric"
inputs = ["parse_json"]

[[transforms.extract_metrics.metrics]]
type = "gauge"
field = "memory_alloc_mb"
name = "etl_memory_alloc_mb"

[[transforms.extract_metrics.metrics]]
type = "gauge"
field = "goroutines"
name = "etl_goroutines"

[sinks.prometheus_exporter]
type = "prometheus_exporter"
inputs = ["extract_metrics"]
address = "0.0.0.0:9090"
default_namespace = "etl"

[sinks.loki]
type = "loki"
inputs = ["parse_json"]
endpoint = "http://loki:3100"
encoding.codec = "json"
labels.job = "vector"
labels.source = "system_metrics"
