api:
  enabled: true
  address: 0.0.0.0:8686

sources:
  etl_metrics:
    type: file
    include:
      - /workspace/logs/etl/system_metrics.jsonl
    read_from: beginning

transforms:
  parse_json:
    type: remap
    inputs:
      - etl_metrics
    source: |
      . = parse_json!(.message)
      .timestamp = to_timestamp!(.timestamp)

  metrics_converter:
    type: log_to_metric
    inputs:
      - parse_json
    metrics:
      - type: gauge
        field: memory_alloc_mb
        name: etl_memory_alloc_mb
      - type: gauge
        field: goroutines
        name: etl_goroutines
      - type: gauge
        field: memory_total_mb
        name: etl_memory_total_mb
      - type: gauge
        field: memory_sys_mb
        name: etl_memory_sys_mb
      - type: counter
        field: num_gc
        name: etl_num_gc

sinks:
  prometheus_exporter:
    type: prometheus_exporter
    inputs:
      - metrics_converter
    address: 0.0.0.0:9090

  loki:
    type: loki
    inputs:
      - parse_json
    endpoint: http://loki:3100
    labels:
      job: "etl_metrics"
    encoding:
      codec: json
