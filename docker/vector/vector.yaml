sources:
  system_metrics_file:
    type: file
    include:
      - /workspace/logs/etl/system_metrics.jsonl
      - /workspace/workspace/logs/etl/system_metrics.jsonl
    read_from: beginning
  application_logs:
    type: file
    include:
      - /workspace/docker/data/logs/*.log
      - /workspace/logs/*.log
    read_from: beginning

transforms:
  parse_system_metrics:
    type: remap
    inputs:
      - system_metrics_file
    source: |
      . = parse_json!(.message)
      .status = "success"

  parse_app_logs:
    type: remap
    inputs:
      - application_logs
    source: |
      . = parse_json!(.message)
      if .level == "error" {
        .status = "error"
      } else {
        .status = "success"
      }
      .request_count = 1

  metrics_converter:
    type: log_to_metric
    inputs:
      - parse_system_metrics
    metrics:
      - type: gauge
        field: num_gc
        name: etl_num_gc
      - type: histogram
        field: gc_pause_ms
        name: etl_gc_pause_ms
      - type: gauge
        field: goroutines
        name: etl_goroutines
      - type: gauge
        field: memory_alloc_mb
        name: etl_memory_alloc_mb
      - type: gauge
        field: memory_sys_mb
        name: etl_memory_sys_mb

  app_metrics_converter:
    type: log_to_metric
    inputs:
      - parse_app_logs
    metrics:
      - type: counter
        field: request_count
        name: etl_request_count
        tags:
          status: "{{status}}"

sinks:
  prometheus_exporter:
    type: prometheus_exporter
    inputs:
      - metrics_converter
      - app_metrics_converter
    address: 0.0.0.0:9090

  loki_sink:
    type: loki
    inputs:
      - parse_system_metrics
      - parse_app_logs
    endpoint: http://loki:3100
    labels:
      source: "vector"
      job: "system_metrics"
    encoding:
      codec: json
