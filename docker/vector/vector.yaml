sources:
  system_metrics:
    type: "file"
    include:
      - "/workspace/logs/etl/system_metrics.jsonl"
      - "/workspace/workspace/logs/etl/system_metrics.jsonl"
    read_from: "beginning"
  app_logs:
    type: "file"
    include:
      - "/workspace/docker/data/logs/*.log"
      - "/workspace/workspace/docker/data/logs/*.log"
      - "/workspace/launcher.log"
      - "/workspace/workspace/launcher.log"
    read_from: "beginning"

transforms:
  parse_json_metrics:
    type: "remap"
    inputs: ["system_metrics"]
    source: |
      . = parse_json!(.message)

  parse_json_logs:
    type: "remap"
    inputs: ["app_logs"]
    source: |
      . = parse_json!(.message)
      .request_status = .status || "unknown"
      .request_level = .level || "info"

  log_to_metrics:
    type: "log_to_metric"
    inputs: ["parse_json_logs"]
    metrics:
      - type: "counter"
        field: "request_level"
        name: "etl_request_count"
        tags:
          level: "{{request_level}}"
          status: "{{request_status}}"

  extract_metrics:
    type: "log_to_metric"
    inputs: ["parse_json_metrics"]
    metrics:
      - type: "gauge"
        field: "goroutines"
        name: "etl_goroutines"
      - type: "gauge"
        field: "memory_alloc_mb"
        name: "etl_memory_alloc_mb"
      - type: "gauge"
        field: "memory_total_mb"
        name: "etl_memory_total_mb"
      - type: "gauge"
        field: "memory_sys_mb"
        name: "etl_memory_sys_mb"
      - type: "gauge"
        field: "num_gc"
        name: "etl_num_gc"

sinks:
  prometheus_exporter:
    type: "prometheus_exporter"
    inputs: ["extract_metrics", "log_to_metrics"]
    address: "0.0.0.0:9090"
    default_namespace: "etl"

  loki:
    type: "loki"
    inputs: ["parse_json_logs"]
    endpoint: "http://loki:3100"
    labels:
      source: "app_logs"
    encoding:
      codec: "json"
