groups:
  - name: etl_alerts
    rules:
      - alert: GoroutinesContinuouslyRising
        expr: deriv(etl_goroutines[5m]) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Goroutines are continuously rising"
          description: "The number of goroutines has been continuously increasing for the last 5 minutes."

      - alert: GCPausesTooHigh
        expr: sum(rate(etl_gc_pause_ms_sum[1m])) / sum(rate(etl_gc_pause_ms_count[1m])) > 20
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "GC pauses are too high"
          description: "Average GC pause time over the last minute is greater than 20ms."
