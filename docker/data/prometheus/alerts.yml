groups:
  - name: etl_alerts
    rules:
      - alert: HighGoroutineGrowth
        expr: deriv(jane_etl_goroutines[5m]) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Continuous growth in active goroutines"
      - alert: HighGCPause
        expr: sum(rate(jane_etl_gc_pause_ms_sum[1m])) / sum(rate(jane_etl_gc_pause_ms_count[1m])) > 20
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "GC pause greater than 20ms"
