[sources.etl_metrics_file]
type = "file"
include = ["/workspace/logs/etl/system_metrics.jsonl"]
read_from = "beginning"

[transforms.parse_json]
type = "remap"
inputs = ["etl_metrics_file"]
source = '''
. = parse_json!(.message)
'''

[transforms.metrics]
type = "log_to_metric"
inputs = ["parse_json"]

[[transforms.metrics.metrics]]
type = "gauge"
field = "goroutines"
name = "etl_goroutines"

[[transforms.metrics.metrics]]
type = "gauge"
field = "memory_alloc_mb"
name = "etl_memory_alloc_mb"

[[transforms.metrics.metrics]]
type = "gauge"
field = "memory_total_mb"
name = "etl_memory_total_mb"

[[transforms.metrics.metrics]]
type = "gauge"
field = "memory_sys_mb"
name = "etl_memory_sys_mb"

[[transforms.metrics.metrics]]
type = "gauge"
field = "num_gc"
name = "etl_num_gc"

[[transforms.metrics.metrics]]
type = "histogram"
field = "gc_pause_ms"
name = "etl_gc_pause_ms"

[sinks.prometheus]
type = "prometheus_exporter"
inputs = ["metrics"]
address = "0.0.0.0:9090"
default_namespace = "etl"

[sinks.loki]
type = "loki"
inputs = ["parse_json"]
endpoint = "http://loki:3100"
labels.job = "etl_system_metrics"
encoding.codec = "json"
