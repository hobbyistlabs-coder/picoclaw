[sources.etl_metrics]
type = "file"
include = ["/workspace/logs/etl/system_metrics.jsonl"]
read_from = "beginning"

[transforms.parse_json]
type = "remap"
inputs = ["etl_metrics"]
source = '''
. = parse_json!(.message)
'''

[transforms.metrics_to_prometheus]
type = "log_to_metric"
inputs = ["parse_json"]

  [[transforms.metrics_to_prometheus.metrics]]
  type = "gauge"
  field = "goroutines"
  name = "etl_goroutines"

  [[transforms.metrics_to_prometheus.metrics]]
  type = "gauge"
  field = "memory_alloc_mb"
  name = "etl_memory_alloc_mb"

  [[transforms.metrics_to_prometheus.metrics]]
  type = "gauge"
  field = "memory_total_mb"
  name = "etl_memory_total_mb"

  [[transforms.metrics_to_prometheus.metrics]]
  type = "gauge"
  field = "memory_sys_mb"
  name = "etl_memory_sys_mb"

  [[transforms.metrics_to_prometheus.metrics]]
  type = "gauge"
  field = "num_gc"
  name = "etl_num_gc"

[sinks.prometheus_exporter]
type = "prometheus_exporter"
inputs = ["metrics_to_prometheus"]
address = "0.0.0.0:9090"

[sinks.loki]
type = "loki"
inputs = ["parse_json"]
endpoint = "http://loki:3100"
encoding.codec = "json"
  [sinks.loki.labels]
  job = "etl_metrics"
