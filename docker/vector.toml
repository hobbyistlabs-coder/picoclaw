[sources.system_metrics]
type = "file"
include = ["/workspace/logs/etl/system_metrics.jsonl", "/workspace/workspace/logs/etl/system_metrics.jsonl"]
read_from = "beginning"

[sources.app_logs]
type = "file"
include = ["/workspace/docker/data/logs/*.log", "/workspace/workspace/docker/data/logs/*.log", "/workspace/launcher.log", "/workspace/workspace/launcher.log"]
read_from = "beginning"

[transforms.parse_metrics]
type = "remap"
inputs = ["system_metrics"]
source = '''
  . = parse_json!(.message)
'''

[transforms.metrics_extracted]
type = "log_to_metric"
inputs = ["parse_metrics"]

  [[transforms.metrics_extracted.metrics]]
  type = "gauge"
  field = "goroutines"
  name = "etl_goroutines"

  [[transforms.metrics_extracted.metrics]]
  type = "gauge"
  field = "memory_alloc_mb"
  name = "etl_memory_alloc_mb"

  [[transforms.metrics_extracted.metrics]]
  type = "gauge"
  field = "num_gc"
  name = "etl_num_gc"

  [[transforms.metrics_extracted.metrics]]
  type = "histogram"
  field = "gc_pause_ms"
  name = "etl_gc_pause_ms"

[transforms.parse_logs]
type = "remap"
inputs = ["app_logs"]
source = '''
  parsed = parse_json!(.message)
  .level = parsed.level || "info"
  .status = parsed.status || "200"
'''

[transforms.logs_extracted]
type = "log_to_metric"
inputs = ["parse_logs"]

  [[transforms.logs_extracted.metrics]]
  type = "counter"
  field = "level"
  name = "etl_request_count"
  tags.status = "{{status}}"

[sinks.prometheus]
type = "prometheus_exporter"
inputs = ["metrics_extracted", "logs_extracted"]
address = "0.0.0.0:9090"

[sinks.loki]
type = "loki"
inputs = ["app_logs"]
endpoint = "http://loki:3100"
labels.job = "app_logs"
encoding.codec = "json"
