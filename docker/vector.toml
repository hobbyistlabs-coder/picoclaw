[sources.system_metrics]
type = "file"
include = [
  "/workspace/logs/etl/system_metrics.jsonl",
  "/workspace/workspace/logs/etl/system_metrics.jsonl"
]
read_from = "beginning"

[sources.app_logs]
type = "file"
include = [
  "/workspace/docker/data/logs/gateway.log",
  "/workspace/workspace/docker/data/logs/gateway.log",
  "/workspace/launcher.log",
  "/workspace/workspace/launcher.log"
]
read_from = "beginning"

[transforms.parse_metrics]
type = "remap"
inputs = ["system_metrics"]
source = '''
. = parse_json!(.message)
'''

[transforms.parse_app_logs]
type = "remap"
inputs = ["app_logs"]
source = '''
. = parse_json!(.message)
'''

[transforms.app_metrics]
type = "log_to_metric"
inputs = ["parse_app_logs"]

  [[transforms.app_metrics.metrics]]
  type = "counter"
  field = "message"
  name = "etl_request_count"
  namespace = "etl"
  tags = { status = "{{status}}", level = "{{level}}" }

[transforms.metrics_to_prom]
type = "log_to_metric"
inputs = ["parse_metrics"]

  [[transforms.metrics_to_prom.metrics]]
  type = "gauge"
  field = "goroutines"
  name = "etl_goroutines"

  [[transforms.metrics_to_prom.metrics]]
  type = "gauge"
  field = "memory_alloc_mb"
  name = "etl_memory_alloc_mb"

  [[transforms.metrics_to_prom.metrics]]
  type = "gauge"
  field = "memory_total_mb"
  name = "etl_memory_total_mb"

  [[transforms.metrics_to_prom.metrics]]
  type = "gauge"
  field = "memory_sys_mb"
  name = "etl_memory_sys_mb"

  [[transforms.metrics_to_prom.metrics]]
  type = "gauge"
  field = "num_gc"
  name = "etl_num_gc"

  [[transforms.metrics_to_prom.metrics]]
  type = "histogram"
  field = "gc_pause_ms"
  name = "etl_gc_pause_ms"

[sinks.prometheus]
type = "prometheus_exporter"
inputs = ["metrics_to_prom", "app_metrics"]
address = "0.0.0.0:9090"

[sinks.loki]
type = "loki"
inputs = ["parse_app_logs", "parse_metrics"]
endpoint = "http://loki:3100"
labels = { source = "vector" }
encoding.codec = "json"
