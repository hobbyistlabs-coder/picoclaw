sources:
  etl_logs:
    type: "file"
    include: ["/workspace/logs/etl/system_metrics.jsonl"]
    read_from: "beginning"

transforms:
  parse_json:
    type: "remap"
    inputs: ["etl_logs"]
    source: |
      . = parse_json!(.message)

  metrics:
    type: "log_to_metric"
    inputs: ["parse_json"]
    metrics:
      - type: "gauge"
        field: "goroutines"
        name: "etl_goroutines"
      - type: "gauge"
        field: "memory_alloc_mb"
        name: "etl_memory_alloc_mb"
      - type: "gauge"
        field: "memory_total_mb"
        name: "etl_memory_total_mb"
      - type: "gauge"
        field: "memory_sys_mb"
        name: "etl_memory_sys_mb"
      - type: "counter"
        field: "num_gc"
        name: "etl_num_gc"
      - type: "histogram"
        field: "gc_pause_ms"
        name: "etl_gc_pause_ms"

sinks:
  prometheus:
    type: "prometheus_exporter"
    inputs: ["metrics"]
    address: "0.0.0.0:9090"
    default_namespace: ""

  loki:
    type: "loki"
    inputs: ["parse_json"]
    endpoint: "http://loki:3100"
    encoding:
      codec: "json"
    labels:
      job: "etl_pipeline"
